name: "🌍 [00a] World Genesis — Sinh Nền Móng Thế Giới"

# ╔══════════════════════════════════════════════════════════════════╗
# ║  CHIMERA V5.0.1 — WORKFLOW 00a: WORLD GENESIS                   ║
# ║  Chạy 1 LẦN để sinh WorldMap + WorldHistory + WorldRules        ║
# ║  bằng Gemini 2.5 Flash với health-check key xoay vòng.          ║
# ║                                                                  ║
# ║  SECRETS YÊU CẦU:                                               ║
# ║    - MONGODB_URL_NO1  (chimera_permanent)                        ║
# ║    - GEMINI_KEY_1 đến GEMINI_KEY_7                              ║
# ╚══════════════════════════════════════════════════════════════════╝

on:
  workflow_dispatch:
    inputs:
      force_rerun:
        description: "Chạy lại dù đã genesis? (gõ: FORCE)"
        required: false
        default: ""

jobs:
  world-genesis:
    name: "🌍 Sinh Nền Móng Thế Giới"
    runs-on: ubuntu-22.04
    timeout-minutes: 15

    steps:
      - name: "📥 Checkout source code"
        uses: actions/checkout@v4

      - name: "🐍 Setup Python 3.11"
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: "📦 Cài đặt thư viện"
        run: |
          python -m pip install --upgrade pip
          pip install \
            pymongo \
            python-dotenv \
            pydantic \
            pydantic-settings \
            google-generativeai

       - name: "🌍 Chạy WorldGenesis"
        env:
          MONGODB_URI_PERMANENT: ${{ secrets.MONGODB_URL_NO1 }}
          MONGODB_URI_PURGATORY: ${{ secrets.MONGODB_URL_NO2 }} 
          MONGODB_URI_CANON: ${{ secrets.MONGODB_URL_NO3 }}     # THÊM DÒNG NÀY
          GEMINI_KEY_1: ${{ secrets.GEMINI_KEY_1 }}
          GEMINI_KEY_2: ${{ secrets.GEMINI_KEY_2 }}
          GEMINI_KEY_3: ${{ secrets.GEMINI_KEY_3 }}
          GEMINI_KEY_4: ${{ secrets.GEMINI_KEY_4 }}
          GEMINI_KEY_5: ${{ secrets.GEMINI_KEY_5 }}
          GEMINI_KEY_6: ${{ secrets.GEMINI_KEY_6 }}
          GEMINI_KEY_7: ${{ secrets.GEMINI_KEY_7 }}
          LOG_LEVEL: "INFO"
        run: |
          FORCE_FLAG=""
          if [ "${{ github.event.inputs.force_rerun }}" = "FORCE" ]; then
            FORCE_FLAG="--force"
            echo "⚠️ FORCE mode: sẽ xóa và tạo lại world foundation."
          fi
          python world_genesis_runner.py $FORCE_FLAG

      - name: "📤 Upload Genesis Log"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: world-genesis-log-${{ github.run_number }}
          path: world_genesis.log
          retention-days: 30

      - name: "✅ Xác nhận kết quả"
        env:
          MONGODB_URI_PERMANENT: ${{ secrets.MONGODB_URL_NO1 }}
        run: |
          python - <<'PYEOF'
          import os
          from pymongo import MongoClient

          client = MongoClient(os.getenv("MONGODB_URI_PERMANENT"))
          db = client["chimera_permanent"]

          info = db["world_info"].find_one({"genesis_completed": True})
          if not info:
              print("❌ genesis_completed flag KHÔNG tồn tại!")
              exit(1)

          zones_doc = db["world_map"].find_one({})
          zones_count = len(zones_doc.get("zones", [])) if zones_doc else 0

          rules_doc = db["world_rules"].find_one({})
          rules_count = len(rules_doc.get("rules", [])) if rules_doc else 0

          history_doc = db["world_history_founding"].find_one({})
          events_count = len(history_doc.get("founding_events", [])) if history_doc else 0

          print(f"✅ WorldGenesis OK")
          print(f"   World: {info.get('world_name', 'unknown')}")
          print(f"   Genesis at: {info.get('genesis_at', 'unknown')}")
          print(f"   Zones: {zones_count}")
          print(f"   Rules: {rules_count}")
          print(f"   Founding events: {events_count}")
          PYEOF
