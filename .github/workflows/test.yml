name: "🧪 Test Pixazo AI Độc Lập"

on:
  workflow_dispatch: 

jobs:
  test-pixazo:
    name: "Tạo ảnh với Pixazo & Gửi Telegram"
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: "🐍 Cài đặt Python & Thư viện"
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          
      - name: "📦 Cài đặt thư viện requests"
        run: pip install requests

      - name: "🎨 Sinh mã Python, chạy Pixazo & Gửi Telegram"
        env:
          PIXAZO_API_KEY: ${{ secrets.PIXAZ_API_KEY1 }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          cat << 'EOF' > test_pixazo.py
          import os
          import requests
          import time
          import json

          PIXAZO_API_KEY = os.environ.get("PIXAZO_API_KEY")
          TELEGRAM_BOT_TOKEN = os.environ.get("TELEGRAM_BOT_TOKEN")
          TELEGRAM_CHAT_ID = os.environ.get("TELEGRAM_CHAT_ID")

          if not PIXAZO_API_KEY or not TELEGRAM_BOT_TOKEN or not TELEGRAM_CHAT_ID:
              print("❌ Thiếu cấu hình API Key hoặc Telegram. Vui lòng kiểm tra Settings -> Secrets.")
              exit(1)

          # Sử dụng Endpoint chuẩn phổ biến nhất cho Image Generation
          MODEL_ENDPOINT = "https://api.pixazo.ai/v1/images/generations"

          PROMPT = (
              "A cinematic portrait of a Vietnamese young man, cynical eyes, messy dark hair, "
              "worn street clothes, with a defiant sneer reflecting his nihilistic worldview, "
              "standing in a dark alley illuminated by faint neon lights. "
              "Cinematic lighting, highly detailed, vertical 9:16 aspect ratio, dramatic composition, film grain, 8k."
          )

          def send_to_telegram(image_url: str):
              print("📤 Đang gửi ảnh về Telegram của anh...")
              tg_url = f"https://api.telegram.org/bot{TELEGRAM_BOT_TOKEN}/sendPhoto"
              payload = {
                  "chat_id": TELEGRAM_CHAT_ID,
                  "photo": image_url,
                  "caption": f"🎬 **TEST PIXAZO AI THÀNH CÔNG!**\n\n📝 *Prompt:* {PROMPT[:100]}...",
                  "parse_mode": "Markdown"
              }
              
              resp = requests.post(tg_url, json=payload)
              if resp.status_code == 200:
                  print("✅ ĐÃ GỬI THÀNH CÔNG! Anh hãy check tin nhắn Telegram.")
              else:
                  print(f"❌ Lỗi gửi Telegram: {resp.text}")

          def test_pixazo():
              print("🚀 Bắt đầu gọi API Pixazo...")
              
              # Header chuẩn OpenAI
              headers = {
                  "Content-Type": "application/json",
                  "Authorization": f"Bearer {PIXAZO_API_KEY}"
              }
              
              # Đưa tên model vào payload
              payload = {
                  "model": "flux-2-max",
                  "prompt": PROMPT,
                  "size": "768x1344", # Tương đương 9:16
                  "n": 1
              }
              
              print(f"📡 Đang gửi Request tới: {MODEL_ENDPOINT}")
              response = requests.post(MODEL_ENDPOINT, headers=headers, json=payload)
              
              if response.status_code not in [200, 201, 202]:
                  print(f"❌ Lỗi gọi API Pixazo: {response.status_code} - {response.text}")
                  print("\n💡 GỢI Ý DÀNH CHO ANH:")
                  print("Nếu vẫn báo lỗi 404, anh hãy vào thẳng trang https://playground.pixazo.ai/")
                  print("Bấm vào nút 'API' hoặc biểu tượng '</>' (View Code) trên màn hình của họ.")
                  print("Ở đó sẽ có đoạn code mẫu chứa chính xác đường dẫn URL mà họ đang dùng!")
                  return

              data = response.json()
              print(f"📥 Phản hồi từ máy chủ:\n{json.dumps(data, indent=2, ensure_ascii=False)}")
              
              # Xử lý trường hợp trả về ảnh trực tiếp (Chuẩn OpenAI)
              if "data" in data and len(data["data"]) > 0 and "url" in data["data"][0]:
                  image_url = data["data"][0]["url"]
                  print(f"🎉 TẠO ẢNH HOÀN TẤT! Link: {image_url}")
                  send_to_telegram(image_url)
                  return
              
              # Xử lý trường hợp trả về Request ID để chờ (Polling)
              request_id = data.get("id") or data.get("request_id")
              if request_id:
                  print(f"✅ Đã lên đơn thành công! Request ID: {request_id}")
                  # Giả lập chờ kết quả (nếu nền tảng yêu cầu gọi lại để check)
                  # ... (có thể cập nhật thêm hàm chờ ở đây nếu họ dùng queue)
              else:
                  print("⚠️ Không tìm thấy URL ảnh hay Request ID trong phản hồi.")

          if __name__ == "__main__":
              test_pixazo()
          EOF

          python test_pixazo.py
              send_to_telegram(image_url)

          if __name__ == "__main__":
              test_pixazo()
          EOF

          # 2. Chạy file Python vừa được tạo ra
          python test_pixazo.py

