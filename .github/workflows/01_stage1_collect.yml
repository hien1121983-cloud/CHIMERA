name: "⚙️ [01] Stage 1 — Thu Thập & Mô Phỏng World State"

# ╔══════════════════════════════════════════════════════════════════╗
# ║  CHIMERA V5.0.1 — WORKFLOW 01: STAGE 1 (BẢN 1)                 ║
# ║                                                                  ║
# ║  Luồng:                                                          ║
# ║    T0–T0h (thu thập song song) → T0i (mô phỏng World State)    ║
# ║    → cache/master_payload_latest.json                            ║
# ║                                                                  ║
# ║  SECRETS YÊU CẦU:                                               ║
# ║    MongoDB: MONGODB_URL_NO1 / NO2 / NO3                         ║
# ║    Telegram: TELEGRAM_BOT_TOKEN / TELEGRAM_CHAT_ID              ║
# ║    API Keys: GEMINI_API_KEY1..7 / GROQ_API_KEY1..6              ║
# ║    ElevenLabs: ELEVENLABS_KEY1..6                               ║
# ╚══════════════════════════════════════════════════════════════════╝

on:
  workflow_dispatch:
  schedule:
    # Chạy tự động lúc 00:00 UTC mỗi ngày (07:00 ICT)
    - cron: "0 0 * * *"

jobs:
  stage-1:
    name: "🔍 Bản 1 — Thu Thập & Mô Phỏng"
    runs-on: ubuntu-22.04
    timeout-minutes: 15

    steps:
      - name: "📥 Checkout source code"
        uses: actions/checkout@v4

      - name: "🐍 Setup Python 3.11"
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: "📦 Cài đặt thư viện Bản 1"
        run: |
          python -m pip install --upgrade pip
          pip install \
            pymongo>=4.6.0 \
            pydantic>=2.5.0 \
            pydantic-settings>=2.1.0 \
            python-dotenv>=1.0.0 \
            requests>=2.31.0 \
            feedparser>=6.0.10 \
            aiohttp>=3.9.0 \
            python-telegram-bot>=20.7

      - name: "🛠️ Auto-Fix DB (bơm dữ liệu khẩn cấp nếu thiếu)"
        env:
          MONGODB_URI_PERMANENT: ${{ secrets.MONGODB_URL_NO1 }}
        run: |
          python - <<'PYEOF'
          import os
          from pymongo import MongoClient

          client = MongoClient(os.getenv("MONGODB_URI_PERMANENT"))
          db = client["chimera_permanent"]

          # Wildcards / Supporting cast
          if db.wildcards.count_documents({}) < 5:
              wildcards = [
                  {"wildcard_id": f"wc_0{i}", "name": n, "role": r, "used": False}
                  for i, (n, r) in enumerate([
                      ("Bà Hàng Xóm Ngồi Lê", "informant"),
                      ("Chủ Nợ Giang Hồ",     "antagonist_minor"),
                      ("Thám Tử Tư Rởm",       "ally"),
                      ("Kẻ Lừa Đảo",            "trickster"),
                      ("Cảnh Sát Nằm Vùng",    "law"),
                      ("Người Đòi Nợ Thuê",    "antagonist_minor"),
                  ], start=1)
              ]
              db.wildcards.delete_many({})
              db.wildcards.insert_many(wildcards)
              db.supporting_cast.delete_many({})
              db.supporting_cast.insert_many(wildcards)
              print(f"[AutoFix] Đã nạp {len(wildcards)} wildcards")

          # Locations
          if db.location_settings.count_documents({}) < 3:
              db.location_settings.delete_many({})
              db.location_settings.insert_many([
                  {"location_id": "loc_01", "name": "Sàn Giao Dịch BĐS Xập Xệ",   "cooldown_remaining": 0, "last_used_episode": 0},
                  {"location_id": "loc_02", "name": "Quán Trà Đá Vỉa Hè",           "cooldown_remaining": 0, "last_used_episode": 0},
                  {"location_id": "loc_03", "name": "Phòng Trọ Sinh Viên",           "cooldown_remaining": 0, "last_used_episode": 0},
                  {"location_id": "loc_04", "name": "Văn Phòng Công Ty Ma",          "cooldown_remaining": 0, "last_used_episode": 0},
              ])
              print("[AutoFix] Đã nạp locations")

          # Secret items
          if db.secret_items.count_documents({}) < 2:
              db.secret_items.delete_many({})
              db.secret_items.insert_many([
                  {"item_id": "item_01", "name": "Khế Ước Bán Mạng",  "rarity": "Legendary", "used": False},
                  {"item_id": "item_02", "name": "Gương Chiếu Nghiệp", "rarity": "Epic",      "used": False},
              ])
              print("[AutoFix] Đã nạp secret_items")

          print("[AutoFix] ✅ Kiểm tra DB hoàn tất.")
          PYEOF

      - name: "🔄 Chạy Bản 1 — Thu thập & Mô phỏng"
        env:
          MONGODB_URI_PERMANENT:  ${{ secrets.MONGODB_URL_NO1 }}
          MONGODB_URI_PURGATORY:  ${{ secrets.MONGODB_URL_NO2 }}
          MONGODB_URI_CANON:      ${{ secrets.MONGODB_URL_NO3 }}
          TELEGRAM_BOT_TOKEN:     ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:       ${{ secrets.TELEGRAM_CHAT_ID }}
          GEMINI_KEY_1:           ${{ secrets.GEMINI_API_KEY1 }}
          GEMINI_KEY_2:           ${{ secrets.GEMINI_API_KEY2 }}
          GEMINI_KEY_3:           ${{ secrets.GEMINI_API_KEY3 }}
          GEMINI_KEY_4:           ${{ secrets.GEMINI_API_KEY4 }}
          GEMINI_KEY_5:           ${{ secrets.GEMINI_API_KEY5 }}
          GEMINI_KEY_6:           ${{ secrets.GEMINI_API_KEY6 }}
          GEMINI_KEY_7:           ${{ secrets.GEMINI_API_KEY7 }}
          CLAUDE_KEY_1:           ${{ secrets.CLAUDE_API_KEY1 }}
          CLAUDE_KEY_2:           ${{ secrets.CLAUDE_API_KEY2 }}
          CLAUDE_KEY_3:           ${{ secrets.CLAUDE_API_KEY3 }}
          CLAUDE_KEY_4:           ${{ secrets.CLAUDE_API_KEY4 }}
          CLAUDE_KEY_5:           ${{ secrets.CLAUDE_API_KEY5 }}
          CLAUDE_KEY_6:           ${{ secrets.CLAUDE_API_KEY6 }}
          ELEVENLABS_KEY_1:       ${{ secrets.ELEVENLABS_KEY1 }}
          ELEVENLABS_KEY_2:       ${{ secrets.ELEVENLABS_KEY2 }}
          ELEVENLABS_KEY_3:       ${{ secrets.ELEVENLABS_KEY3 }}
          ELEVENLABS_KEY_4:       ${{ secrets.ELEVENLABS_KEY4 }}
          ELEVENLABS_KEY_5:       ${{ secrets.ELEVENLABS_KEY5 }}
          ELEVENLABS_KEY_6:       ${{ secrets.ELEVENLABS_KEY6 }}
          LOCAL_CACHE_PATH:       "./cache/local_cache.sqlite"
          ARCHETYPES_CACHE_PATH:  "./cache/archetypes_cache.json"
          LOG_LEVEL:              "INFO"
        run: |
          python main_pipeline.py

      - name: "📦 Upload Master Payload"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: "Stage1-Master-Payload"
          path: |
            cache/master_payload_latest.json
            cache/local_cache.sqlite
          retention-days: 7
