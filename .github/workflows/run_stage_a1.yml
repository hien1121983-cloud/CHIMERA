name: ⚙️ CHẠY BẢN 1: Thu thập & Mô phỏng (Stage 1)

on:
  workflow_dispatch: {}

jobs:
  run-stage-1:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 📥 Kéo mã nguồn về máy ảo
        uses: actions/checkout@v4

      - name: 🐍 Thiết lập Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: 📦 Cài đặt thư viện
        run: |
          python -m pip install --upgrade pip
          # Đã bổ sung pydantic-settings vào danh sách cài đặt
          pip install pymongo pydantic pydantic-settings python-dotenv requests feedparser aiohttp

      - name: 🚀 Khởi chạy Bản 1
        env:
          MONGODB_URI_PERMANENT: ${{ secrets.MONGODB_URL_NO1 }}
          MONGODB_URI_PURGATORY: ${{ secrets.MONGODB_URL_NO2 }}
          MONGODB_URI_CANON: ${{ secrets.MONGODB_URL_NO3 }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python main_pipeline.py

      - name: 📋 Trích xuất Kết quả (Master Payload)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: KET-QUA-BAN-1-Master-Payload
          path: |
            cache/
            *.log
          retention-days: 7
          
