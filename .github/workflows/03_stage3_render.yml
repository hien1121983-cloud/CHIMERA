name: "🎞️ [03] Stage 3 — Render Media & Giao Hàng"

# ╔══════════════════════════════════════════════════════════════════╗
# ║  CHIMERA V5.0.1 — WORKFLOW 03: STAGE 3 (BẢN 3)                 ║
# ║                                                                  ║
# ║  Luồng:                                                          ║
# ║    A2 Dispatcher (bóc tách script) → T5 Postman (sinh ảnh       ║
# ║    Pollinations + audio ElevenLabs/Edge-TTS) → Audio Merger      ║
# ║    → T6 FFmpeg (render MP4 9:16) → T7 Courier (gửi Telegram)    ║
# ║    → Garbage Collector (dọn rác sau delivery)                    ║
# ║                                                                  ║
# ║  YÊU CẦU: Stage 2 phải đã chạy và được duyệt                    ║
# ║    (có cache/master_script_latest.json với approved=true)        ║
# ║                                                                  ║
# ║  SECRETS YÊU CẦU:                                               ║
# ║    MongoDB: MONGODB_URL_NO1 / NO2 / NO3                         ║
# ║    Telegram: TELEGRAM_BOT_TOKEN / TELEGRAM_CHAT_ID              ║
# ║    API Keys: GROQ_API_KEY1..6 / ELEVENLABS_KEY1..6              ║
# ║    (Gemini không cần ở Bản 3 — chỉ Groq + ElevenLabs)          ║
# ╚══════════════════════════════════════════════════════════════════╝

on:
  workflow_dispatch:

jobs:
  stage-3:
    name: "🎬 Bản 3 — Render & Giao Hàng"
    runs-on: ubuntu-22.04
    timeout-minutes: 45

    steps:
      - name: "📥 Checkout source code"
        uses: actions/checkout@v4

      - name: "🐍 Setup Python 3.11"
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: "🎞️ Cài FFmpeg"
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg
          ffmpeg -version | head -1
          echo "✅ FFmpeg đã sẵn sàng"

      - name: "📦 Cài đặt thư viện Bản 3"
        run: |
          python -m pip install --upgrade pip
          pip install \
            pymongo>=4.6.0 \
            pydantic>=2.5.0 \
            pydantic-settings>=2.1.0 \
            python-dotenv>=1.0.0 \
            requests>=2.31.0 \
            aiohttp>=3.9.0 \
            python-telegram-bot>=20.7 \
            groq>=0.4.0 \
            elevenlabs>=0.2.27 \
            edge-tts>=6.1.9 \
            pydub>=0.25.1 \
            psutil>=5.9.0

      - name: "📂 Download Master Script từ Stage 2"
        uses: actions/download-artifact@v4
        with:
          name: "Stage2-Master-Script"
          path: cache/
        continue-on-error: true

      - name: "🔍 Kiểm tra Master Script đã được duyệt"
        run: |
          if [ ! -f "cache/master_script_latest.json" ]; then
            echo "❌ Không tìm thấy cache/master_script_latest.json"
            echo "   → Hãy chạy Workflow 02 (Stage 2) và duyệt kịch bản trước."
            exit 1
          fi
          APPROVED=$(python3 -c "import json; d=json.load(open('cache/master_script_latest.json')); print(str(d.get('meta',{}).get('approved', False)).lower())")
          EPISODE=$(python3 -c "import json; d=json.load(open('cache/master_script_latest.json')); print(d['meta']['episode_number'])")
          echo "Episode: $EPISODE | Approved: $APPROVED"
          if [ "$APPROVED" != "true" ]; then
            echo "❌ Script chưa được duyệt (approved=false). Pipeline dừng."
            exit 1
          fi
          echo "✅ Master Script tập $EPISODE đã được duyệt — bắt đầu render."

      - name: "🎬 Chạy Bản 3 — Render & Giao Hàng"
        env:
          MONGODB_URI_PERMANENT:     ${{ secrets.MONGODB_URL_NO1 }}
          MONGODB_URI_PURGATORY:     ${{ secrets.MONGODB_URL_NO2 }}
          MONGODB_URI_CANON:         ${{ secrets.MONGODB_URL_NO3 }}
          TELEGRAM_BOT_TOKEN:        ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:          ${{ secrets.TELEGRAM_CHAT_ID }}
          CLAUDE_KEY_1:           ${{ secrets.CLAUDE_API_KEY1 }}
          CLAUDE_KEY_2:           ${{ secrets.CLAUDE_API_KEY2 }}
          CLAUDE_KEY_3:           ${{ secrets.CLAUDE_API_KEY3 }}
          CLAUDE_KEY_4:           ${{ secrets.CLAUDE_API_KEY4 }}
          CLAUDE_KEY_5:           ${{ secrets.CLAUDE_API_KEY5 }}
          CLAUDE_KEY_6:           ${{ secrets.CLAUDE_API_KEY6 }}
          ELEVENLABS_KEY_1:          ${{ secrets.ELEVENLABS_KEY1 }}
          ELEVENLABS_KEY_2:          ${{ secrets.ELEVENLABS_KEY2 }}
          ELEVENLABS_KEY_3:          ${{ secrets.ELEVENLABS_KEY3 }}
          ELEVENLABS_KEY_4:          ${{ secrets.ELEVENLABS_KEY4 }}
          ELEVENLABS_KEY_5:          ${{ secrets.ELEVENLABS_KEY5 }}
          ELEVENLABS_KEY_6:          ${{ secrets.ELEVENLABS_KEY6 }}
          LOCAL_CACHE_PATH:          "./cache/local_cache.sqlite"
          RESOURCE_LOCK_MAX_CONCURRENT: "2"
          RESOURCE_LOCK_MAX_RAM_PERCENT: "75.0"
          FFMPEG_THREADS:            "2"
          FFMPEG_CRF:                "28"
          FFMPEG_PRESET:             "veryfast"
          LOG_LEVEL:                 "INFO"
        run: |
          python main_media_pipeline.py

      - name: "📦 Upload artifacts (giữ lại khi lỗi để debug)"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: "Stage3-Final-Output"
          path: |
            temp/
            cache/master_script_latest.json
          retention-days: 3
