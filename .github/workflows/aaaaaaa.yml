name: Pack Repository for LLM Review

on:
  workflow_dispatch: # Cho phép kích hoạt bằng nút bấm tay trên giao diện GitHub

jobs:
  pack-repo:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Bước 1 - Kéo mã nguồn về máy ảo
        uses: actions/checkout@v4

      - name: Bước 2 - Thiết lập Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Bước 3 - Chạy Script Gom Code
        run: |
          # Nếu bạn chưa tạo file repo_packer.py trên repo, có thể dán trực tiếp mã Python vào đây
          # Nhưng tốt nhất là gọi file đã có sẵn:
          python repo_packer.py

      - name: Bước 4 - Upload kết quả thành Artifact
        uses: actions/upload-artifact@v4
        with:
          name: CHIMERA_SOURCE_CODE
          path: chimera_full_source.txt
          retention-days: 1 # Xóa sau 1 ngày cho nhẹ hệ thống
          
