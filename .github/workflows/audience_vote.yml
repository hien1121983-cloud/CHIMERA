name: audience_vote
on:
  schedule:
    - cron: "0 10 */5 * *"
  workflow_dispatch:
jobs:
  vote:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install -r chimera/requirements.txt
      - name: Launch world poll
        env:
          ENABLE_META_LAYER: "true"
          ENABLE_CO_CREATION: "true"
          MONGODB_URL_NO1: ${{ secrets.MONGODB_URL_NO1 }}
          MONGODB_URL_NO2: ${{ secrets.MONGODB_URL_NO2 }}
          MONGODB_URL_NO3: ${{ secrets.MONGODB_URL_NO3 }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          cd chimera
          python -c "from src.meta import co_creation; co_creation.launch_world_poll(0, [])"