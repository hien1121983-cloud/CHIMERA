name: CHIMERA FULL PIPELINE (STAGE 1 -> 2 -> 3)

on:
  workflow_dispatch:

jobs:
  run-full-pipeline:
    runs-on: ubuntu-22.04
    timeout-minutes: 45

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pymongo pydantic pydantic-settings python-dotenv requests feedparser aiohttp python-telegram-bot google-generativeai groq fastapi uvicorn numpy sentence-transformers elevenlabs edge-tts moviepy Pillow

      # (Tuỳ chọn) Bỏ dấu thăng (#) ở 2 dòng dưới nếu bạn muốn chạy luôn Bản 1 để cào tin tức mới
      # - name: Run Stage 1 (Thu thập tin tức & Tạo JSON)
      #   run: python main_pipeline.py

      - name: Run Stage 2 (Xưởng Kịch Bản & Gửi Telegram)
        run: python main_creative_pipeline.py

      - name: Run Stage 3 (Xưởng Media & Trả Video)
        if: success()
        run: python main_media_pipeline.py

      - name: Upload Final Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: KET-QUA-CHIMERA-FINAL
          path: |
            cache/
            temp/
            logs/
          retention-days: 7
