name: Daily Episode Production (Stage A — Script only)

# Stage A KHÔNG chờ user. Chỉ:
#   1. Sinh kịch bản 15 phân cảnh.
#   2. Gửi tin nhắn duyệt + cinematic_video_prompt cho Scene 1.
#   3. Lưu purgatory vào Mongo.
# Sau đó kết thúc -> máy ảo GitHub không bao giờ phải "ngủ" -> không bao giờ
# chạm timeout 30 phút.
# Stage B (sinh ảnh 2..N + ghép FFmpeg) chạy ở assemble_video.yml,
# được trigger bởi webhook KHI user đã upload đủ scene_01.mp4.

on:
  schedule:
    - cron: "0 1 * * *"   # 08:00 GMT+7
  workflow_dispatch:

permissions:
  contents: write
  actions: read

concurrency:
  group: chimera-stage-a
  cancel-in-progress: false

jobs:
  produce-script:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    env:
      PYTHONWARNINGS: ignore
      GEMINI_API_KEY1: ${{ secrets.GEMINI_API_KEY1 }}
      GEMINI_API_KEY2: ${{ secrets.GEMINI_API_KEY2 }}
      GEMINI_API_KEY3: ${{ secrets.GEMINI_API_KEY3 }}
      GEMINI_API_KEY4: ${{ secrets.GEMINI_API_KEY4 }}
      GEMINI_API_KEY5: ${{ secrets.GEMINI_API_KEY5 }}
      GEMINI_API_KEY6: ${{ secrets.GEMINI_API_KEY6 }}
      GEMINI_API_KEY7: ${{ secrets.GEMINI_API_KEY7 }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      # 6 ElevenLabs key xoay vòng
      ELEVENLABS_KEY1: ${{ secrets.ELEVENLABS_KEY1 }}
      ELEVENLABS_KEY2: ${{ secrets.ELEVENLABS_KEY2 }}
      ELEVENLABS_KEY3: ${{ secrets.ELEVENLABS_KEY3 }}
      ELEVENLABS_KEY4: ${{ secrets.ELEVENLABS_KEY4 }}
      ELEVENLABS_KEY5: ${{ secrets.ELEVENLABS_KEY5 }}
      ELEVENLABS_KEY6: ${{ secrets.ELEVENLABS_KEY6 }}
      MONGODB_URL_NO1: ${{ secrets.MONGODB_URL_NO1 }}
      MONGODB_URL_NO2: ${{ secrets.MONGODB_URL_NO2 }}
      MONGODB_URL_NO3: ${{ secrets.MONGODB_URL_NO3 }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      TELEGRAM_WEBHOOK_SECRET: ${{ secrets.TELEGRAM_WEBHOOK_SECRET }}
      DEBUG_MODE: "false"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run Stage A — generate script & wait for human upload
        run: python -m src.main --stage produce_script
