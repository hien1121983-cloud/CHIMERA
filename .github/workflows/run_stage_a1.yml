name: RUN STAGE 1 PIPELINE

on:
  workflow_dispatch: {}

jobs:
  run-stage-1:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pymongo pydantic pydantic-settings python-dotenv requests feedparser aiohttp python-telegram-bot

      - name: 🛠️ Auto-Fix Database (Bơm dữ liệu khẩn cấp)
        env:
          MONGODB_URI_PERMANENT: ${{ secrets.MONGODB_URL_NO1 }}
        run: |
          cat << 'EOF' > autofix_db.py
          import os
          from pymongo import MongoClient
          
          client = MongoClient(os.getenv("MONGODB_URI_PERMANENT"))
          db = client["chimera_permanent"]

          # 1. Bơm khẩn cấp Địa điểm (T0b)
          if db.location_settings.count_documents({}) == 0:
              db.location_settings.insert_many([
                  {"location_id": "loc_01", "name": "Sàn Giao Dịch BĐS Xập Xệ", "cooldown_remaining": 0, "last_used_episode": 0},
                  {"location_id": "loc_02", "name": "Quán Trà Đá Vỉa Hè", "cooldown_remaining": 0, "last_used_episode": 0}
              ])
              print("[AutoFix] Đã nạp khẩn cấp Location Settings.")

          # 2. Fix lệch tên bảng Vật phẩm bí mật (T0g)
          if db.secret_items.count_documents({}) == 0:
              items = list(db.world_secret_items.find({}, {"_id": 0}))
              if not items: # Nếu bảng cũ cũng trống, tự tạo mới
                  items = [
                      {"item_id": "item_01", "name": "Khế Ước Bán Mạng", "rarity": "Legendary", "used": False},
                      {"item_id": "item_02", "name": "Gương Chiếu Nghiệp", "rarity": "Epic", "used": False}
                  ]
              db.secret_items.insert_many(items)
              print("[AutoFix] Đã nạp khẩn cấp Secret Items.")

          # 3. Bơm khẩn cấp Nhân vật phụ (T0h)
          if db.wildcards.count_documents({}) == 0:
              db.wildcards.insert_many([
                  {"wildcard_id": "wc_01", "name": "Bà Hàng Xóm Ngồi Lê Đôi Mách", "role": "informant", "used": False},
                  {"wildcard_id": "wc_02", "name": "Chủ Nợ Giang Hồ", "role": "antagonist_minor", "used": False}
              ])
          if db.supporting_cast.count_documents({}) == 0:
              db.supporting_cast.insert_many([
                  {"wildcard_id": "wc_01", "name": "Bà Hàng Xóm Ngồi Lê Đôi Mách", "role": "informant", "used": False},
                  {"wildcard_id": "wc_02", "name": "Chủ Nợ Giang Hồ", "role": "antagonist_minor", "used": False}
              ])
          print("[AutoFix] Đã nạp khẩn cấp Supporting Cast/Wildcards.")
          EOF
          python autofix_db.py

      - name: Run Main Pipeline
        env:
          MONGODB_URI_PERMANENT: ${{ secrets.MONGODB_URL_NO1 }}
          MONGODB_URI_PURGATORY: ${{ secrets.MONGODB_URL_NO2 }}
          MONGODB_URI_CANON: ${{ secrets.MONGODB_URL_NO3 }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          
          # MAPPING TOÀN BỘ 18 API KEYS
          GEMINI_KEY_1: ${{ secrets.GEMINI_API_KEY1 }}
          GEMINI_KEY_2: ${{ secrets.GEMINI_API_KEY2 }}
          GEMINI_KEY_3: ${{ secrets.GEMINI_API_KEY3 }}
          GEMINI_KEY_4: ${{ secrets.GEMINI_API_KEY4 }}
          GEMINI_KEY_5: ${{ secrets.GEMINI_API_KEY5 }}
          GEMINI_KEY_6: ${{ secrets.GEMINI_API_KEY6 }}
          GEMINI_KEY_7: ${{ secrets.GEMINI_API_KEY7 }}
          
          GROQ_KEY_1: ${{ secrets.GROQ_API_KEY1 }}
          GROQ_KEY_2: ${{ secrets.GROQ_API_KEY2 }}
          GROQ_KEY_3: ${{ secrets.GROQ_API_KEY3 }}
          GROQ_KEY_4: ${{ secrets.GROQ_API_KEY4 }}
          GROQ_KEY_5: ${{ secrets.GROQ_API_KEY5 }}
          GROQ_KEY_6: ${{ secrets.GROQ_API_KEY6 }}
          
          
          
          ELEVENLABS_KEY_1: ${{ secrets.ELEVENLABS_KEY1 }}
          ELEVENLABS_KEY_2: ${{ secrets.ELEVENLABS_KEY2 }}
          ELEVENLABS_KEY_3: ${{ secrets.ELEVENLABS_KEY3 }}
          ELEVENLABS_KEY_4: ${{ secrets.ELEVENLABS_KEY4 }}
          ELEVENLABS_KEY_5: ${{ secrets.ELEVENLABS_KEY5 }}
          ELEVENLABS_KEY_6: ${{ secrets.ELEVENLABS_KEY6 }}
          
        run: |
          python main_pipeline.py

      - name: Upload Master Payload Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Master-Payload-Result
          path: |
            cache/
            *.log
          retention-days: 7
          
