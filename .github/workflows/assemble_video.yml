name: Assemble Video (Stage B — after user uploads Scene 1)

# Trigger bởi webhook (FastAPI) qua workflow_dispatch khi đã nhận đủ
# scene_01.mp4 của episode. Workflow này KHÔNG chờ ai: chỉ kéo dữ liệu từ
# Mongo, sinh ảnh 2..N, gọi TTS (ElevenLabs Round-Robin -> edge-tts fallback),
# ghép FFmpeg (có glitch transition tĩnh), rồi gửi MP4 sang Telegram.

on:
  workflow_dispatch:
    inputs:
      episode_id:
        description: "Episode ID (vd: ep_20250115_0100)"
        required: true
      version:
        description: "Version (1..3)"
        required: true
        default: "1"

permissions:
  contents: read
  actions: read

concurrency:
  group: chimera-stage-b-${{ github.event.inputs.episode_id }}-${{ github.event.inputs.version }}
  cancel-in-progress: false

jobs:
  assemble:
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    env:
      PYTHONWARNINGS: ignore
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      ELEVENLABS_KEY1: ${{ secrets.ELEVENLABS_KEY1 }}
      ELEVENLABS_KEY2: ${{ secrets.ELEVENLABS_KEY2 }}
      ELEVENLABS_KEY3: ${{ secrets.ELEVENLABS_KEY3 }}
      ELEVENLABS_KEY4: ${{ secrets.ELEVENLABS_KEY4 }}
      ELEVENLABS_KEY5: ${{ secrets.ELEVENLABS_KEY5 }}
      ELEVENLABS_KEY6: ${{ secrets.ELEVENLABS_KEY6 }}
      MONGODB_URL_NO1: ${{ secrets.MONGODB_URL_NO1 }}
      MONGODB_URL_NO2: ${{ secrets.MONGODB_URL_NO2 }}
      MONGODB_URL_NO3: ${{ secrets.MONGODB_URL_NO3 }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      TELEGRAM_WEBHOOK_SECRET: ${{ secrets.TELEGRAM_WEBHOOK_SECRET }}
      GITHUB_REPO: ${{ github.repository }}
      PAT_GITHUB: ${{ secrets.PAT_GITHUB }}
      EPISODE_ID: ${{ github.event.inputs.episode_id }}
      VERSION: ${{ github.event.inputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Install FFmpeg
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ffmpeg
          ffmpeg -version | head -n 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run Stage B — assemble video
        run: python -m src.main --stage assemble --episode-id "$EPISODE_ID" --version "$VERSION"

      - name: Cleanup
        if: always()
        run: rm -rf /tmp/chimera_staging || true
