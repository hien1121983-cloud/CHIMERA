name: RUN STAGE 1 PIPELINE

on:
  workflow_dispatch: {}

jobs:
  run-stage-1:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          # Đã bổ sung thêm aiohttp vào danh sách cài đặt
          pip install pymongo pydantic python-dotenv requests feedparser aiohttp

      - name: Run Main Pipeline
        env:
          MONGODB_URI_PERMANENT: ${{ secrets.MONGODB_URL_NO1 }}
          MONGODB_URI_PURGATORY: ${{ secrets.MONGODB_URL_NO2 }}
          MONGODB_URI_CANON: ${{ secrets.MONGODB_URL_NO3 }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python main_pipeline.py

      - name: Upload Master Payload Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Master-Payload-Result
          path: |
            cache/
            *.log
          retention-days: 7
          
