name: Canon Commit (FIFO 50)

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Phiên bản đã chọn (1/2/3)"
        required: true
      episode_id:
        description: "Episode ID"
        required: true

permissions:
  contents: write

concurrency:
  group: chimera-canon
  cancel-in-progress: false

jobs:
  commit-canon:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    env:
      MONGO_URI: ${{ secrets.MONGO_URI }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_GITHUB }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: python -m pip install -r requirements.txt

      - name: Commit canon to history (FIFO 50)
        run: python -m src.storage.history_fifo --episode "${{ inputs.episode_id }}" --version "${{ inputs.version }}"

      - name: Git push
        run: |
          git config user.name "chimera-bot"
          git config user.email "bot@chimera.local"
          git add history/
          git commit -m "chore(history): canon episode ${{ inputs.episode_id }} v${{ inputs.version }} [skip ci]" || echo "nothing to commit"
          git push
